<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack AI</title>
<style>
  body{font-family:sans-serif;margin:0;padding:0;background:#f5f5f5;color:#111;}
  header{background:#34d399;color:white;padding:12px;text-align:center;font-size:1.5em;font-weight:700;}
  .container{padding:16px;}
  input, button{padding:8px 12px;font-size:16px;margin:4px 0;}
  #search-results{margin-top:16px;}
  .search-result{display:flex;align-items:center;padding:8px;background:white;margin-bottom:6px;border-radius:8px;cursor:pointer;transition:0.2s;}
  .search-result:hover{background:#d1fae5;}
  .results-hint{margin-bottom:8px;font-size:13px;color:#555;}
  #search-loading{display:none;color:#34d399;font-weight:700;}
  #search-error{display:none;color:red;font-weight:700;margin-top:6px;}
</style>
</head>
<body>

<header>NutriTrack AI</header>

<div class="container">
  <input type="text" id="ai-search" placeholder="Search food or recipe...">
  <button id="search-btn" onclick="doAISearch()">Search</button>
  <span id="search-loading">Loading...</span>
  <div id="search-error"></div>
  <div id="search-results"></div>
</div>

<script>
async function doAISearch(){
  const q = document.getElementById('ai-search').value.trim();
  if(!q) return;

  const btn = document.getElementById('search-btn');
  const loadEl = document.getElementById('search-loading');
  const errEl = document.getElementById('search-error');
  const resEl = document.getElementById('search-results');

  btn.disabled = true; btn.textContent = '...';
  loadEl.style.display = 'inline';
  errEl.style.display = 'none';
  resEl.innerHTML = '';

  try {
    const resp = await fetch('/.netlify/functions/ai-search', { // Netlify function path
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ query: q })
    });

    const data = await resp.json();

    // Claude might wrap JSON in ```json blocks
    const raw = data?.content?.[0]?.text || '[]';
    const items = JSON.parse(raw.replace(/```json|```/g,'').trim());

    if(!items.length){
      errEl.textContent = 'No results found. Try a different search.';
      errEl.style.display = 'block';
    } else {
      resEl.innerHTML = `<div class="results-hint">Tap to add to log</div>` +
        items.map(r => `
          <div class="search-result" onclick="addFromSearch('${r.name.replace(/'/g,"\\'")}',${r.calories},'${r.emoji}')">
            <span style="font-size:22px">${r.emoji}</span>
            <div style="flex:1"><div style="font-weight:600;font-size:14px">${r.name}</div></div>
            <div style="font-weight:800;color:#34d399;font-size:15px;margin-right:6px">${r.calories} kcal</div>
            <span style="color:#34d399;font-size:20px;font-weight:700">+</span>
          </div>`).join('');
    }

  } catch(err) {
    errEl.textContent = 'Search failed. Please check your connection and try again.';
    errEl.style.display = 'block';
    console.error(err);
  }

  btn.disabled = false; btn.textContent = 'Search';
  loadEl.style.display = 'none';
}

// Placeholder: implement your log functionality
function addFromSearch(name, calories, emoji){
  alert(`Added ${name} (${calories} kcal) ${emoji} to your log!`);
}
</script>

</body>
</html>
